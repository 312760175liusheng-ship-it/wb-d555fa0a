<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永辉考察清单（私有）</title>
<style>
  :root{ --bg:#f5f5f0; --card:#fff; --line:#e3e1d8; --text:#2c2c2a; --muted:#76746c; --accent:#1d9e75; --accentbg:#e1f5ee; --blue:#185fa5; --bluebg:#e6f1fb; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; line-height:1.55; padding:16px; }
  .wrap{ max-width:680px; margin:0 auto; }
  h1{ font-size:21px; font-weight:600; margin:6px 0 4px; }
  .sub{ color:var(--muted); font-size:13px; margin:0 0 12px; }
  .tips{ background:var(--bluebg); color:#0c447c; border-radius:10px; padding:10px 13px; font-size:13px; margin:0 0 14px; line-height:1.7; }
  .tips b{ font-weight:600; }
  .prog{ height:7px; background:var(--line); border-radius:6px; overflow:hidden; margin:6px 0; }
  .prog>div{ height:100%; background:var(--accent); width:0%; transition:.2s; }
  .progtxt{ font-size:12px; color:var(--muted); margin-bottom:10px; }
  .block{ font-size:15px; font-weight:600; margin:16px 0 7px; }
  .item{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:9px; }
  .item.done{ background:var(--accentbg); border-color:var(--accent); }
  .q{ display:flex; align-items:flex-start; gap:9px; }
  .q input[type=checkbox]{ width:19px; height:19px; margin-top:1px; flex-shrink:0; accent-color:var(--accent); }
  .q .qt{ font-size:14px; font-weight:600; }
  .ask{ margin:7px 0 0 28px; font-size:13.5px; line-height:1.5; background:var(--accentbg);
    border-radius:7px; padding:7px 10px; color:#0f5c43; }
  .meta{ margin:6px 0 0 28px; font-size:12px; color:var(--muted); line-height:1.6; }
  .meta div{ margin:1px 0; }
  textarea{ width:100%; border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-size:14px;
    font-family:inherit; color:var(--text); background:#fff; resize:vertical; min-height:42px; margin:7px 0 0; }
  textarea:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accentbg); }
  .out{ background:var(--card); border:1.5px solid var(--accent); border-radius:10px; padding:13px 15px; margin-top:16px; }
  .out h2{ font-size:16px; font-weight:600; margin:0 0 4px; }
  .out p{ font-size:13px; color:var(--muted); margin:0 0 9px; }
  .out textarea{ min-height:120px; }
  .save{ font-size:11px; color:var(--accent); }
  .foot{ color:var(--muted); font-size:12px; margin-top:16px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔍 永辉考察清单</h1>
  <p class="sub">绿框=到现场的动作，下面跟着看什么/怎么判断/记什么。<span class="save">✓ 自动存本机。</span></p>

  <div class="tips">
    <b>考察前先记三句：</b> ① 去 2–3 次、不同时段（工作日午晚高峰 + 周末）；② 像侦探、不是逛街——<b>亲自买一次、吃一次</b>，顺手拍素材；③ 超市跟餐饮看的逻辑一样：怎么把人勾进来 → 怎么让人还想来 → 靠啥赚钱 → 怎么能复制。
  </div>

  <div class="prog"><div id="bar"></div></div>
  <div class="progtxt" id="progtxt">0 / 0</div>

  <div id="list"></div>

  <div class="out">
    <h2>📝 回来产出：永辉给我们快餐连锁的 5 条启发</h2>
    <p>没产出物不算考察。把最有用的 5 条写下来，这是交给郝哥的作业。</p>
    <textarea id="takeaways" placeholder="1.&#10;2.&#10;3.&#10;4.&#10;5."></textarea>
  </div>

  <p class="foot">私有 · 别外发 ｜ 改了跟 Claude 说一声推一下</p>
</div>

<script>
const SECTIONS = {
  "🎯 ① 引流 → 留存（最重要）": [
    {id:"a1", q:"什么把人吸进门？",
     act:"站入口旁边别动，待 3–5 分钟。盯进来的人：脚先迈向哪边、眼先瞟哪儿；再抬头看门头/橱窗在主推什么。",
     look:"门口和一进门第一眼的区域——大海报、堆在门口的商品、最大最红的价格牌。",
     judge:"放在『进门必经第一站 + 吆喝声最大』位置的，就是勾人进门的钩子（多半低价爆品、现烤、活鲜）。",
     note:"门口主推的 1–3 样东西 + 大家进门先冲向的那个区。"},
    {id:"a2", q:"什么让人还想再来？",
     act:"① 看有没有人办会员、店员推不推；② 找『熟门熟路、直奔某区』的人，听店员跟谁熟；③ 找别处买不到、只有这儿有的东西；④ 问 2–3 个人：『你常来吗？为啥总来这家？』",
     look:"『再来』看不见，靠 4 个代理信号侧面判断——会员热度、回头客、独一份招牌货、顾客原话。",
     judge:"愿办会员=用钱包说『我还来』；熟客多=留得住；有独一份招牌货=有人专门为它跑一趟。越多复购越强。",
     note:"会员火不火、有没有明显熟客、那个『只有永辉有』的招牌货是啥 + 顾客原话。➕ 自己买一次吃一次，问『我会为它专门再来吗？为什么？』"},
    {id:"a3", q:"我自己被什么勾住了？",
     act:"放下『考察员』，当个真顾客逛一圈、买点东西。全程留意自己啥时候心里冒出『想买/这个不错/下次还买』。",
     look:"你自己心里冒出来的『购买冲动』。",
     judge:"能勾起你冲动的东西/瞬间，大概率也能勾别人——那就是这店最有效的钩子。",
     note:"每个让你动心的东西 + 当时场景（看到？闻到？试吃到？）。"}
  ],
  "🔥 ② 爆品逻辑（流量品 vs 利润品）": [
    {id:"b1", q:"怎么认『赔本赚吆喝』的引流爆款？",
     act:"边逛边对 4 个信号：① 价格比菜市场/别家明显低（低到你嘀咕『这价能赚钱吗』）；② 摆门口/堆成小山 + 最大红海报；③ 标『每人限购 X 份』；④ 前面围最多人、推车里最多。",
     look:"价格反常低、位置最显眼、写限购、最多人抢的商品。",
     judge:"中 2 条以上基本就是。再心算成本（现烤面包、活鱼、鸡蛋、大米常见）——不靠它赚钱，靠它把你勾进来顺手买别的。",
     note:"认出的 2–3 个引流爆款是啥、便宜到啥程度。"},
    {id:"b2", q:"哪些是真赚钱的？",
     act:"① 找贴『永辉/胖东来』自己牌子的；② 看熟食区/烘焙区/现制档口；③ 留意那些不打折、不吆喝、却一直有人拿的东西。",
     look:"自有品牌、熟食/现制/烘焙、安静卖却一直有人买的日常品。",
     judge:"自有品牌没中间商、加工品比卖原料赚——这些闷声赚钱。引流款在门口喊，赚钱款在里头静静摆。",
     note:"哪几类是它真正赚钱的（自有品牌？熟食？）。"},
    {id:"b3", q:"靠哪个明星单品打心智？",
     act:"① 看海报/招牌/吊旗反复出现谁；② 听店员嘴里『我们的 XX』；③ 问去过的朋友、问你自己『一提永辉先想到啥』。",
     look:"被反复强调的那个招牌商品。",
     judge:"大家异口同声、反复出现那个，就是它用来占你脑子的『心智单品』（比如某款面包、活鲜）。",
     note:"永辉的招牌/代名词是哪样东西。"}
  ],
  "✨ ③ 体验与细节（留人的『真东西』）": [
    {id:"c1", q:"服务/员工状态怎么样？",
     act:"故意找个员工问个问题（『XX 在哪？』），看他热不热情、带不带你去；再扫一眼员工整体精气神、有没有主动试吃/介绍。",
     look:"员工的主动性 + 精神面貌。",
     judge:"员工主动、精神足=管理好、待遇好（胖东来那套），服务能留人；爱搭不理=普通店。",
     note:"服务给几分、哪个员工细节让你印象深。"},
    {id:"c2", q:"有哪些『比普通超市用心』的细节？",
     act:"重点去生鲜区闻有没有异味（生鲜最见功夫）、看地面货架干不干净、价签清不清、有没有免费试吃和现烤现切现做的开放档口。",
     look:"干净度、陈列、试吃、现制、灯光动线。",
     judge:"挑出 3 个明显『比你印象里普通超市讲究』的地方——这就是它花钱买体验、换复购的地方。",
     note:"3 个最用心的细节。"},
    {id:"c3", q:"哪个细节让我『有好感/想买』？",
     act:"逛的过程里，任何一个让你心里『咦，这个贴心/讲究/想买』的瞬间，立刻停下记。",
     look:"你自己的『好感瞬间』。",
     judge:"能让你产生好感的细节，就是值得抄到你们快餐店的『小心机』。",
     note:"1–3 个打动你的细节（试吃、包装、提示牌、一句话…）。"}
  ],
  "🧩 ④ 可复制性（连锁的命根 · 郝哥最想你学）": [
    {id:"d1", q:"哪些是标准化、能复制的？",
     act:"边看边问自己一句：『这个开第二家店，能不能原样照搬？』看陈列有没有模板感、价签导视统不统一、员工欢迎语是不是一套、结账称重加工像不像练过。",
     look:"像『复制粘贴』出来的——固定套路的陈列、统一的价签海报、一套话术、训练过的流程。",
     judge:"能原样照搬的，就是标准化、可复制的——这正是连锁的命根。",
     note:"3 样你觉得『明显是设计好、能复制』的东西。"},
    {id:"d2", q:"供应链/自有品牌怎么撑的？",
     act:"① 数一数贴『永辉/胖东来』牌子的多不多；② 看生鲜区/活鲜区新不新鲜、品种全不全；③ 留意熟食烘焙有没有『统一配送/中央厨房』的影子。",
     look:"自有品牌的比例 + 生鲜活鲜的新鲜度和丰富度。",
     judge:"自有品牌多 + 生鲜强 = 供应链硬（自己掌控、不被中间商卡），这是连锁能开下去的底子。",
     note:"自有品牌多不多、生鲜强不强。"},
    {id:"d3", q:"这套搬到我们快餐，哪些能复制？",
     act:"看到一个好做法，当场翻译成『快餐版』。例：『现烤面包香味勾人』→『现炒锅气/爆款菜勾人下单』；『会员锁客』→『私域群锁客』；『招牌单品打心智』→『打造一道招牌菜』。",
     look:"永辉每一个『聪明做法』。",
     judge:"凡是能翻译成『你们快餐能用』的招，就是这趟最值钱的收获。",
     note:"3 条『永辉的招 → 我们快餐怎么用』。"}
  ],
  "💰 ⑤ 生意眼（像老板那样读店）": [
    {id:"e1", q:"几点人多、几点人少？",
     act:"尽量分时段去、或一次待久点，记下大概几点开始多、几点最挤、几点冷清。",
     look:"不同时段的客流量。",
     judge:"超市一般饭点前、傍晚下班后是高峰。摸清『客流节奏』，才知道做活动、推外卖卡哪个点。",
     note:"高峰时段、低谷时段。"},
    {id:"e2", q:"哪个区人最密？大家买什么？",
     act:"走一圈，看哪个区永远围着人（多半生鲜/特价/熟食），瞄几个推车看里头最多的是啥。",
     look:"人流最集中的区域 + 大家推车里的东西。",
     judge:"人最密的区 = 这店的『流量发动机』，靠它带动全场。",
     note:"最旺的 1–2 个区、大家最爱买的东西。"},
    {id:"e3", q:"估一下：客单价、排队、坪效",
     act:"① 在收银台瞄几个人结账金额/推车满不满，估个平均客单；② 看队排多长、等多久；③ 整体感受『这么大店、这么多人、这个客单』。",
     look:"顾客大概花多少钱、收银排队、整体人效。",
     judge:"客单 × 客流，毛估它一天大概做多少、是赚是赔——这就是『用生意眼读店』。",
     note:"估的客单价、排队情况、你对它赚不赚的整体判断。"}
  ]
};

const list = document.getElementById('list');
let checks = JSON.parse(localStorage.getItem('yh_checks')||'{}');
let notes = JSON.parse(localStorage.getItem('yh_notes')||'{}');
let total = 0;

Object.keys(SECTIONS).forEach(sec=>{
  const h=document.createElement('div'); h.className='block'; h.textContent=sec; list.appendChild(h);
  SECTIONS[sec].forEach(it=>{
    const id=it.id; total++;
    const box=document.createElement('div'); box.className='item'+(checks[id]?' done':'');
    const q=document.createElement('label'); q.className='q';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=!!checks[id];
    const qt=document.createElement('span'); qt.className='qt'; qt.textContent=it.q;
    q.appendChild(cb); q.appendChild(qt); box.appendChild(q);
    const ask=document.createElement('div'); ask.className='ask'; ask.textContent='🔧 怎么做：'+it.act;
    box.appendChild(ask);
    const meta=document.createElement('div'); meta.className='meta';
    [['👀 看什么：',it.look],['🧠 怎么判断：',it.judge],['✍️ 记什么：',it.note]].forEach(p=>{
      const d=document.createElement('div'); d.textContent=p[0]+p[1]; meta.appendChild(d);
    });
    box.appendChild(meta);
    const ta=document.createElement('textarea'); ta.placeholder='看到什么，记这里…'; ta.value=notes[id]||'';
    box.appendChild(ta);
    cb.addEventListener('change',()=>{ checks[id]=cb.checked; localStorage.setItem('yh_checks',JSON.stringify(checks)); box.classList.toggle('done',cb.checked); prog(); });
    ta.addEventListener('input',()=>{ notes[id]=ta.value; localStorage.setItem('yh_notes',JSON.stringify(notes)); });
    list.appendChild(box);
  });
});

const tk=document.getElementById('takeaways');
tk.value=localStorage.getItem('yh_takeaways')||'';
tk.addEventListener('input',()=>localStorage.setItem('yh_takeaways',tk.value));

function prog(){
  const done=Object.values(checks).filter(Boolean).length;
  document.getElementById('bar').style.width=(total?Math.round(done/total*100):0)+'%';
  document.getElementById('progtxt').textContent=done+' / '+total+' 已看';
}
prog();
</script>
</body>
</html>
